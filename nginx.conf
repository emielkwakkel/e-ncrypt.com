server {
  listen 80;
  server_name e-ncrypt.com www.e-ncrypt.com;
  root /var/www/e-ncrypt/browser;
  index index.html;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  types {
    application/manifest+json webmanifest;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;

  location = /favicon.ico {
    return 301 /assets/icon/favicon.png;
  }

  location / {
    try_files $uri $uri/ $uri/index.html /index.html;
  }

  location ~* \.(?:css|js|mjs|map|woff2?|png|jpe?g|gif|svg|ico|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache";
  }
}
